<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coding Challenge — Intervexa AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
<style>
:root{
  --bg:#080A0F;--bg2:#0D1117;--bg3:#111820;--bg4:#0A0E14;
  --panel:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.07);
  --accent:#00E5FF;--accent2:#7B61FF;--accent3:#FF6B6B;
  --text:#F0F4FF;--muted:#5A6480;--muted2:#8A94B0;--green:#00FFB3;
  --yellow:#FFD166;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;line-height:1.6;display:flex;flex-direction:column}

/* ── NAV ── */
nav{height:52px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100}
.nav-left{display:flex;align-items:center;gap:16px}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:.95rem;font-weight:800;text-decoration:none;color:var(--text)}
.nav-logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:8px;display:grid;place-items:center;font-size:.8rem}
.nav-logo span{color:var(--accent2)}
.nav-divider{width:1px;height:20px;background:var(--border)}
.nav-title{font-size:.85rem;font-weight:700;color:var(--text)}
.nav-right{display:flex;align-items:center;gap:10px}
.diff-badge{padding:3px 10px;border-radius:20px;font-size:.68rem;font-family:'DM Mono',monospace;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.diff-easy{background:rgba(0,255,179,.1);color:var(--green);border:1px solid rgba(0,255,179,.2)}
.diff-medium{background:rgba(255,209,102,.1);color:var(--yellow);border:1px solid rgba(255,209,102,.2)}
.diff-hard{background:rgba(255,107,107,.1);color:var(--accent3);border:1px solid rgba(255,107,107,.2)}
.nav-btn{padding:6px 14px;border:1px solid var(--border);border-radius:7px;background:transparent;color:var(--muted2);font-family:'Syne',sans-serif;font-size:.78rem;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.nav-btn:hover{border-color:var(--accent2);color:var(--accent2)}

/* ── MAIN LAYOUT ── */
.workspace{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── LEFT: PROBLEM PANEL ── */
.problem-panel{width:420px;min-width:300px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.prob-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.prob-tab{padding:10px 18px;font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:'Syne',sans-serif}
.prob-tab.active{color:var(--text);border-color:var(--accent2)}
.prob-tab:hover:not(.active){color:var(--muted2)}
.prob-content{flex:1;overflow-y:auto;padding:24px}
.prob-content::-webkit-scrollbar{width:4px}
.prob-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Problem description */
.prob-header{margin-bottom:20px}
.prob-num{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted2);margin-bottom:6px}
.prob-title{font-size:1.3rem;font-weight:800;letter-spacing:-.02em;margin-bottom:10px}
.prob-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.prob-tag{padding:3px 10px;background:var(--panel);border:1px solid var(--border);border-radius:20px;font-size:.68rem;color:var(--muted2);font-family:'DM Mono',monospace}
.prob-desc{font-size:.875rem;color:var(--muted2);line-height:1.8;margin-bottom:20px}
.prob-desc strong{color:var(--text)}
.prob-section{font-size:.72rem;font-family:'DM Mono',monospace;color:var(--accent2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;margin-top:20px}
.code-block{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-family:'DM Mono',monospace;font-size:.82rem;color:var(--text);line-height:1.7;white-space:pre;overflow-x:auto;margin-bottom:12px}
.code-block::-webkit-scrollbar{height:3px}
.code-block::-webkit-scrollbar-thumb{background:var(--border)}
.io-row{display:flex;gap:12px;margin-bottom:10px}
.io-box{flex:1;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px}
.io-label{font-size:.65rem;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.io-val{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--text);line-height:1.6}
.constraint-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.constraint-list li{font-size:.82rem;color:var(--muted2);font-family:'DM Mono',monospace;padding-left:14px;position:relative}
.constraint-list li::before{content:'•';position:absolute;left:0;color:var(--accent2)}

/* Hints tab */
.hint-item{padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.hint-item:hover{border-color:rgba(123,97,255,.3)}
.hint-hdr{display:flex;align-items:center;justify-content:space-between;font-size:.82rem;font-weight:600}
.hint-body{font-size:.8rem;color:var(--muted2);margin-top:10px;line-height:1.6;display:none}
.hint-body.open{display:block}

/* Solutions tab */
.solution-approach{padding:16px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;margin-bottom:14px}
.sol-title{font-size:.85rem;font-weight:700;margin-bottom:4px}
.sol-complexity{display:flex;gap:10px;margin-bottom:10px}
.sol-chip{padding:2px 8px;border-radius:5px;font-size:.68rem;font-family:'DM Mono',monospace}
.sol-chip.time{background:rgba(0,229,255,.08);color:var(--accent);border:1px solid rgba(0,229,255,.15)}
.sol-chip.space{background:rgba(123,97,255,.08);color:var(--accent2);border:1px solid rgba(123,97,255,.15)}
.sol-desc{font-size:.8rem;color:var(--muted2);line-height:1.6}

/* ── RIGHT: EDITOR PANEL ── */
.editor-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.editor-topbar{height:44px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border-bottom:1px solid var(--border);flex-shrink:0}
.lang-select{padding:5px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Mono',monospace;font-size:.78rem;outline:none;cursor:pointer;transition:border-color .2s}
.lang-select:focus{border-color:var(--accent2)}
.lang-select option{background:#0D1117}
.editor-actions{display:flex;gap:8px;align-items:center}
.reset-btn{padding:5px 12px;border:1px solid var(--border);border-radius:7px;background:transparent;color:var(--muted2);font-family:'Syne',sans-serif;font-size:.75rem;cursor:pointer;transition:all .2s}
.reset-btn:hover{border-color:var(--accent3);color:var(--accent3)}
.run-btn{padding:6px 16px;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.3);border-radius:7px;color:var(--accent);font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.run-btn:hover{background:rgba(0,229,255,.18);box-shadow:0 0 16px rgba(0,229,255,.15)}
.submit-btn{padding:6px 18px;background:var(--green);border:none;border-radius:7px;color:#080A0F;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:800;cursor:pointer;transition:all .2s}
.submit-btn:hover{background:#fff;box-shadow:0 0 18px rgba(0,255,179,.25)}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}

/* CODE EDITOR AREA */
.editor-wrap{flex:1;display:flex;min-height:0;position:relative;font-family:'DM Mono',monospace;font-size:.875rem}
.line-nums{width:44px;padding:14px 0;background:var(--bg4);border-right:1px solid var(--border);text-align:right;color:var(--muted);font-size:.78rem;line-height:1.6;overflow:hidden;flex-shrink:0;user-select:none}
.line-num{padding-right:10px;display:block}
.code-editor{flex:1;padding:14px 16px;background:var(--bg4);border:none;outline:none;color:var(--text);font-family:'DM Mono',monospace;font-size:.875rem;line-height:1.6;resize:none;min-height:0;tab-size:2;white-space:pre;overflow-y:auto;caret-color:var(--accent)}
.code-editor::-webkit-scrollbar{width:4px}
.code-editor::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* BOTTOM CONSOLE */
.console-panel{height:220px;flex-shrink:0;border-top:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2)}
.console-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.console-tab{padding:8px 16px;font-size:.75rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:'Syne',sans-serif}
.console-tab.active{color:var(--text);border-color:var(--accent2)}
.console-body{flex:1;overflow-y:auto;padding:14px 16px;font-family:'DM Mono',monospace;font-size:.8rem;line-height:1.7}
.console-body::-webkit-scrollbar{width:3px}
.console-body::-webkit-scrollbar-thumb{background:var(--border)}
.console-placeholder{color:var(--muted);font-style:italic}

/* Test case results */
.test-results{display:flex;flex-direction:column;gap:8px}
.test-case{padding:10px 14px;border-radius:9px;border:1px solid var(--border);background:var(--bg3)}
.test-case.pass{border-color:rgba(0,255,179,.25);background:rgba(0,255,179,.04)}
.test-case.fail{border-color:rgba(255,107,107,.25);background:rgba(255,107,107,.04)}
.test-case.running{border-color:rgba(0,229,255,.2);background:rgba(0,229,255,.04);animation:testPulse 1s ease infinite}
@keyframes testPulse{0%,100%{opacity:1}50%{opacity:.6}}
.tc-hdr{display:flex;align-items:center;gap:8px;font-size:.78rem;font-weight:600}
.tc-status{width:18px;height:18px;border-radius:50%;display:grid;place-items:center;font-size:.7rem;flex-shrink:0}
.tc-status.pass{background:rgba(0,255,179,.15);color:var(--green)}
.tc-status.fail{background:rgba(255,107,107,.15);color:var(--accent3)}
.tc-status.run{background:rgba(0,229,255,.15);color:var(--accent)}
.tc-detail{font-size:.75rem;color:var(--muted2);margin-top:5px;display:none;line-height:1.6}
.tc-detail.open{display:block}
.tc-row{display:flex;gap:6px;margin-top:3px}
.tc-key{color:var(--muted);width:70px;flex-shrink:0}
.tc-val{color:var(--text)}
.tc-expected{color:var(--green)}
.tc-got.wrong{color:var(--accent3)}
.tc-got.right{color:var(--green)}

/* Submit result banner */
.submit-banner{padding:14px 18px;border-radius:12px;display:none;margin-bottom:8px;animation:fadeUp .3s ease}
.submit-banner.show{display:flex;align-items:center;gap:14px}
.submit-banner.accepted{background:rgba(0,255,179,.08);border:1px solid rgba(0,255,179,.25)}
.submit-banner.rejected{background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.25)}
.sb-icon{font-size:1.5rem}
.sb-title{font-size:.95rem;font-weight:800}
.sb-sub{font-size:.75rem;color:var(--muted2);margin-top:2px}
.sb-stats{display:flex;gap:16px;margin-left:auto}
.sb-stat{text-align:center}
.sb-stat-val{font-size:.9rem;font-weight:700;display:block;font-family:'DM Mono',monospace}
.sb-stat-lbl{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}

/* QUESTION LIST SIDEBAR (collapsed by default) */
.q-list-overlay{position:fixed;inset:0;z-index:200;background:rgba(4,6,10,.8);backdrop-filter:blur(8px);display:none}
.q-list-overlay.open{display:block}
.q-list-panel{position:fixed;left:0;top:52px;bottom:0;width:340px;background:var(--bg2);border-right:1px solid var(--border);z-index:201;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .3s ease}
.q-list-panel.open{transform:none}
.q-list-hdr{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.q-list-title{font-size:1rem;font-weight:800}
.q-list-body{flex:1;overflow-y:auto;padding:12px}
.q-item{padding:12px 14px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px}
.q-item:hover{border-color:rgba(123,97,255,.35);background:rgba(123,97,255,.05)}
.q-item.active{border-color:var(--accent2);background:rgba(123,97,255,.1)}
.q-item-num{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);width:24px;flex-shrink:0}
.q-item-info{flex:1;min-width:0}
.q-item-title{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-item-sub{font-size:.7rem;color:var(--muted2);margin-top:2px}
.q-item-solved{width:18px;height:18px;border-radius:50%;background:rgba(0,255,179,.15);color:var(--green);font-size:.7rem;display:grid;place-items:center;flex-shrink:0}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Resize handle */
.resize-handle{width:4px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background .2s;position:relative;z-index:10}
.resize-handle:hover{background:var(--accent2)}

/* Scrollbar global */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

@media(max-width:768px){
  .problem-panel{display:none}
  .editor-panel{width:100%}
}
</style>
</head>
<body>

<!-- QUESTION LIST OVERLAY -->
<div class="q-list-overlay" id="qListOverlay" onclick="toggleQList()"></div>
<div class="q-list-panel" id="qListPanel">
  <div class="q-list-hdr">
    <div class="q-list-title">Problem Set</div>
    <button class="nav-btn" onclick="toggleQList()">✕</button>
  </div>
  <div class="q-list-body" id="qListBody"></div>
</div>

<!-- NAV -->
<nav>
  <div class="nav-left">
    <a href="intervexa-ai.html" class="nav-logo">
      <div class="nav-logo-icon">⚡</div>
      Intervexa <span>AI</span>
    </a>
    <div class="nav-divider"></div>
    <button class="nav-btn" onclick="toggleQList()">☰ Problems</button>
    <div class="nav-title" id="navTitle">Two Sum</div>
  </div>
  <div class="nav-right">
    <span class="diff-badge diff-easy" id="navDiff">Easy</span>
    <div style="display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:.75rem;color:var(--muted2)">
      <span id="navSolved" style="color:var(--green)">0</span>/<span id="navTotal">20</span> solved
    </div>
    <a href="aptitude.html" class="nav-btn">🧠 Aptitude</a>
    <a href="home.html" class="nav-btn">🎤 Interview</a>
  </div>
</nav>

<!-- WORKSPACE -->
<div class="workspace">

  <!-- PROBLEM PANEL -->
  <div class="problem-panel" id="problemPanel">
    <div class="prob-tabs">
      <div class="prob-tab active" onclick="switchProbTab('desc',this)">Description</div>
      <div class="prob-tab" onclick="switchProbTab('hints',this)">Hints</div>
      <div class="prob-tab" onclick="switchProbTab('solutions',this)">Solutions</div>
    </div>

    <!-- Description tab -->
    <div class="prob-content" id="tabDesc"></div>

    <!-- Hints tab -->
    <div class="prob-content" id="tabHints" style="display:none"></div>

    <!-- Solutions tab -->
    <div class="prob-content" id="tabSolutions" style="display:none"></div>
  </div>

  <!-- RESIZE HANDLE -->
  <div class="resize-handle" id="resizeHandle"></div>

  <!-- EDITOR PANEL -->
  <div class="editor-panel">
    <div class="editor-topbar">
      <select class="lang-select" id="langSelect" onchange="changeLang()">
        <option value="javascript">JavaScript</option>
        <option value="python">Python</option>
        <option value="java">Java</option>
        <option value="cpp">C++</option>
      </select>
      <div class="editor-actions">
        <button class="reset-btn" onclick="resetCode()">↺ Reset</button>
        <button class="run-btn" onclick="runCode()"><span>▶</span> Run</button>
        <button class="submit-btn" id="submitBtn" onclick="submitCode()">Submit</button>
      </div>
    </div>

    <!-- CODE EDITOR -->
    <div class="editor-wrap">
      <div class="line-nums" id="lineNums"><span class="line-num">1</span></div>
      <textarea class="code-editor" id="codeEditor" spellcheck="false"
        oninput="updateLineNums()" onkeydown="handleKey(event)"
        onscroll="syncScroll()"></textarea>
    </div>

    <!-- CONSOLE / TEST RESULTS -->
    <div class="console-panel">
      <div class="console-tabs">
        <div class="console-tab active" id="tabTestcases" onclick="switchConsoleTab('testcases',this)">Test Cases</div>
        <div class="console-tab" id="tabConsole" onclick="switchConsoleTab('console',this)">Console</div>
      </div>
      <div class="console-body" id="consolebody">
        <div class="console-placeholder">Click Run to execute your code against test cases…</div>
      </div>
    </div>
  </div>

</div>

<script>
// ══════════════════════════ PROBLEM BANK ══════════════════════════
var PROBLEMS = [
  {
    id:1, title:"Two Sum", diff:"Easy", tags:["Array","Hash Map"],
    desc:`Given an array of integers <strong>nums</strong> and an integer <strong>target</strong>, return indices of the two numbers such that they add up to target.\n\nYou may assume that each input would have exactly one solution, and you may not use the same element twice.\n\nYou can return the answer in any order.`,
    examples:[
      {input:"nums = [2,7,11,15], target = 9",output:"[0,1]",exp:"nums[0] + nums[1] == 9, return [0, 1]"},
      {input:"nums = [3,2,4], target = 6",output:"[1,2]",exp:"nums[1] + nums[2] == 6"},
      {input:"nums = [3,3], target = 6",output:"[0,1]"}
    ],
    constraints:["2 ≤ nums.length ≤ 10⁴","-10⁹ ≤ nums[i] ≤ 10⁹","-10⁹ ≤ target ≤ 10⁹","Only one valid answer exists"],
    hints:["Try using a hash map to store numbers you've seen","For each number, check if target - num exists in the map","You only need one pass through the array"],
    approaches:[
      {title:"Brute Force",time:"O(n²)",space:"O(1)",desc:"Check every pair of numbers using two nested loops. Simple but slow."},
      {title:"Hash Map (Optimal)",time:"O(n)",space:"O(n)",desc:"Store each number and its index in a hash map. For each element, check if (target - element) exists in the map."}
    ],
    testCases:[
      {input:[[2,7,11,15],9],expected:[0,1]},
      {input:[[3,2,4],6],expected:[1,2]},
      {input:[[3,3],6],expected:[0,1]},
      {input:[[-1,-2,-3,-4,-5],-8],expected:[2,4]},
      {input:[[1,5,3,2],4],expected:[2,3]}
    ],
    starterCode:{
      javascript:`/**
 * @param {number[]} nums
 * @param {number} target
 * @return {number[]}
 */
function twoSum(nums, target) {
  // Your code here
  
}`,
      python:`def twoSum(nums, target):
    # Your code here
    pass`,
      java:`class Solution {
    public int[] twoSum(int[] nums, int target) {
        // Your code here
        return new int[]{};
    }
}`,
      cpp:`class Solution {
public:
    vector<int> twoSum(vector<int>& nums, int target) {
        // Your code here
        return {};
    }
};`
    },
    solution:`function twoSum(nums, target) {
  const map = new Map();
  for (let i = 0; i < nums.length; i++) {
    const complement = target - nums[i];
    if (map.has(complement)) return [map.get(complement), i];
    map.set(nums[i], i);
  }
}`
  },
  {
    id:2, title:"Palindrome Check", diff:"Easy", tags:["String","Two Pointers"],
    desc:`Write a function that takes a string and returns <strong>true</strong> if it is a palindrome, and <strong>false</strong> otherwise.\n\nA string is a palindrome when it reads the same forward and backward.\n\nConsider only alphanumeric characters and ignore case.`,
    examples:[
      {input:'"racecar"',output:"true"},
      {input:'"hello"',output:"false"},
      {input:'"A man a plan a canal Panama"',output:"true",exp:"After removing spaces and lowercasing: amanaplanacanalpanama"}
    ],
    constraints:["1 ≤ s.length ≤ 2×10⁵","s consists only of printable ASCII characters"],
    hints:["Use two pointers — one from start, one from end","Skip non-alphanumeric characters","Compare characters ignoring case"],
    approaches:[
      {title:"Reverse String",time:"O(n)",space:"O(n)",desc:"Clean the string, reverse it, compare with original."},
      {title:"Two Pointers (Optimal)",time:"O(n)",space:"O(1)",desc:"Use left and right pointers, move them inward comparing characters."}
    ],
    testCases:[
      {input:["racecar"],expected:true},
      {input:["hello"],expected:false},
      {input:["A man a plan a canal Panama"],expected:true},
      {input:["Was it a car or a cat I saw"],expected:true},
      {input:["not a palindrome"],expected:false}
    ],
    starterCode:{
      javascript:`/**
 * @param {string} s
 * @return {boolean}
 */
function isPalindrome(s) {
  // Your code here
  
}`,
      python:`def isPalindrome(s):
    # Your code here
    pass`,

        +'<div class="q-item-sub"><span class="diff-badge '+diffClass+'" style="font-size:.62rem;padding:2px 7px">'+p.diff+'</span></div>'
      +'</div>'
      +(solved?'<div class="q-item-solved">✓</div>':'')
      +'</div>';
  });
  document.getElementById('qListBody').innerHTML=html;
}

function loadProblem(idx){
  state.currentProbIdx=idx;
  currentProb=PROBLEMS[idx];
  // Nav
  document.getElementById('navTitle').textContent=currentProb.title;
  var diffClass=currentProb.diff==='Easy'?'diff-easy':currentProb.diff==='Medium'?'diff-medium':'diff-hard';
  document.getElementById('navDiff').className='diff-badge '+diffClass;
  document.getElementById('navDiff').textContent=currentProb.diff;
  // Q list active
  document.querySelectorAll('.q-item').forEach(function(el,i){ el.classList.toggle('active',i===idx); });
  // Build description
  buildDesc();
  buildHints();
  buildSolutions();
  // Code
  var savedCode=state.userCode[currentProb.id+'_'+state.lang];
  document.getElementById('codeEditor').value=savedCode||currentProb.starterCode[state.lang]||'';
  updateLineNums();
  // Reset console
  document.getElementById('consolebody').innerHTML='<div class="console-placeholder">Click Run to execute your code against test cases…</div>';
}

function buildDesc(){
  var p=currentProb;
  var html='<div class="prob-header">';
  html+='<div class="prob-num">Problem #'+p.id+'</div>';
  html+='<div class="prob-title">'+escHtml(p.title)+'</div>';
  html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
  var dc=p.diff==='Easy'?'diff-easy':p.diff==='Medium'?'diff-medium':'diff-hard';
  html+='<span class="diff-badge '+dc+'">'+p.diff+'</span>';
  if(state.solved[p.id]) html+='<span style="font-size:.72rem;color:var(--green);font-family:\'DM Mono\',monospace">✓ Solved</span>';
  html+='</div>';
  html+='<div class="prob-tags">';
  p.tags.forEach(function(t){ html+='<span class="prob-tag">'+t+'</span>'; });
  html+='</div></div>';
  html+='<div class="prob-desc">'+p.desc.replace(/\n/g,'<br><br>')+'</div>';
  html+='<div class="prob-section">Examples</div>';
  p.examples.forEach(function(ex,i){
    html+='<div style="margin-bottom:14px">';
    html+='<div style="font-size:.72rem;font-family:\'DM Mono\',monospace;color:var(--muted2);margin-bottom:6px">Example '+(i+1)+':</div>';
    html+='<div class="io-row">';
    html+='<div class="io-box"><div class="io-label">Input</div><div class="io-val">'+escHtml(ex.input)+'</div></div>';
    html+='<div class="io-box"><div class="io-label">Output</div><div class="io-val">'+escHtml(ex.output)+'</div></div>';
    html+='</div>';
    if(ex.exp) html+='<div style="font-size:.78rem;color:var(--muted2);margin-top:6px;font-family:\'DM Mono\',monospace">Explanation: '+escHtml(ex.exp)+'</div>';
    html+='</div>';
  });
  html+='<div class="prob-section">Constraints</div>';
  html+='<ul class="constraint-list">';
  p.constraints.forEach(function(c){ html+='<li>'+escHtml(c)+'</li>'; });
  html+='</ul>';
  document.getElementById('tabDesc').innerHTML=html;
}

function buildHints(){
  var p=currentProb;
  var html='<div class="prob-section" style="margin-top:0">Hints</div>';
  html+='<div style="font-size:.8rem;color:var(--muted2);margin-bottom:16px">Click a hint to reveal it. Try to solve without hints first!</div>';
  p.hints.forEach(function(h,i){
    html+='<div class="hint-item" onclick="toggleHint(this)">'
      +'<div class="hint-hdr"><span>💡 Hint '+(i+1)+'</span><span style="color:var(--muted);font-size:.78rem">Click to reveal</span></div>'
      +'<div class="hint-body">'+escHtml(h)+'</div>'
      +'</div>';
  });
  document.getElementById('tabHints').innerHTML=html;
}
function toggleHint(el){
  var body=el.querySelector('.hint-body');
  body.classList.toggle('open');
  el.querySelector('.hint-hdr span:last-child').textContent=body.classList.contains('open')?'':'Click to reveal';
}

function buildSolutions(){
  var p=currentProb;
  var html='<div class="prob-section" style="margin-top:0">Approaches</div>';
  p.approaches.forEach(function(a){
    html+='<div class="solution-approach">';
    html+='<div class="sol-title">'+escHtml(a.title)+'</div>';
    html+='<div class="sol-complexity"><span class="sol-chip time">Time: '+escHtml(a.time)+'</span><span class="sol-chip space">Space: '+escHtml(a.space)+'</span></div>';
    html+='<div class="sol-desc">'+escHtml(a.desc)+'</div>';
    html+='</div>';
  });
  html+='<div class="prob-section" style="margin-top:8px">Reference Solution</div>';
  html+='<div style="font-size:.78rem;color:var(--accent3);margin-bottom:10px;font-family:\'DM Mono\',monospace">⚠ Only view after attempting</div>';
  html+='<div onclick="toggleSolution(this)" style="cursor:pointer;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;font-size:.8rem;color:var(--muted2)">👁 Click to show solution</div>';
  html+='<div id="solCode" style="display:none;margin-top:8px"><div class="code-block">'+escHtml(p.solution)+'</div></div>';
  document.getElementById('tabSolutions').innerHTML=html;
}
function toggleSolution(el){ var s=document.getElementById('solCode'); s.style.display=s.style.display==='none'?'block':'none'; el.textContent=s.style.display==='none'?'👁 Click to show solution':'🙈 Hide solution'; }

// ══════════════════════════ TABS ══════════════════════════
function switchProbTab(tab,el){
  document.querySelectorAll('.prob-tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  ['tabDesc','tabHints','tabSolutions'].forEach(function(id){ document.getElementById(id).style.display='none'; });
  document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).style.display='block';
}

function switchConsoleTab(tab,el){
  document.querySelectorAll('.console-tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
}

// ══════════════════════════ EDITOR ══════════════════════════
function changeLang(){
  var lang=document.getElementById('langSelect').value;
  // Save current code
  state.userCode[currentProb.id+'_'+state.lang]=document.getElementById('codeEditor').value;
  state.lang=lang;
  var saved=state.userCode[currentProb.id+'_'+lang];
  document.getElementById('codeEditor').value=saved||currentProb.starterCode[lang]||'';
  updateLineNums();
}

function resetCode(){
  if(confirm('Reset to starter code?')){
    state.userCode[currentProb.id+'_'+state.lang]='';
    document.getElementById('codeEditor').value=currentProb.starterCode[state.lang]||'';
    updateLineNums();
    document.getElementById('consolebody').innerHTML='<div class="console-placeholder">Click Run to execute your code against test cases…</div>';
  }
}

function updateLineNums(){
  var code=document.getElementById('codeEditor').value;
  var lines=code.split('\n').length;
  var html='';
  for(var i=1;i<=lines;i++) html+='<span class="line-num">'+i+'</span>';
  document.getElementById('lineNums').innerHTML=html;
  // Save code
  if(currentProb) state.userCode[currentProb.id+'_'+state.lang]=code;
}

function syncScroll(){
  document.getElementById('lineNums').scrollTop=document.getElementById('codeEditor').scrollTop;
}

function handleKey(e){
  if(e.key==='Tab'){
    e.preventDefault();
    var ta=e.target;
    var start=ta.selectionStart, end=ta.selectionEnd;
    ta.value=ta.value.substring(0,start)+'  '+ta.value.substring(end);
    ta.selectionStart=ta.selectionEnd=start+2;
    updateLineNums();
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){ e.preventDefault(); runCode(); }
}

// ══════════════════════════ RUN CODE (JS sandbox) ══════════════════════════
function runCode(){
  var code=document.getElementById('codeEditor').value;
  var lang=state.lang;
  var p=currentProb;

  if(lang!=='javascript'){
    document.getElementById('consolebody').innerHTML=
      '<div style="color:var(--yellow);font-family:\'DM Mono\',monospace;font-size:.8rem;line-height:1.7">'
      +'⚠ Live execution is supported for <strong style="color:var(--text)">JavaScript only</strong> in this browser-based editor.<br><br>'
      +'For '+lang+', the test cases show expected outputs. You can verify your logic manually or switch to JavaScript to run live tests.'
      +'</div>';
    return;
  }

  // Show running state
  var html='<div class="test-results" id="testResultsWrap">';
  p.testCases.forEach(function(tc,i){
    html+='<div class="test-case running" id="tc-'+i+'">'
      +'<div class="tc-hdr"><span class="tc-status run">⟳</span> Test Case '+(i+1)+'</div>'
      +'</div>';
  });
  html+='</div>';
  document.getElementById('consolebody').innerHTML=html;

  // Run each test case
  setTimeout(function(){
    p.testCases.forEach(function(tc,i){
      setTimeout(function(){
        var result=runTestCase(code, p, tc);
        updateTestCase(i, result, tc);
      }, i*120);
    });
  }, 50);
}

function runTestCase(code, prob, tc){
  try{
    // Build function from user code
    var funcCode=code;
    // Get function name from starter code
    var fnMatch=prob.starterCode.javascript.match(/function\s+(\w+)\s*\(/);
    if(!fnMatch) return {pass:false,got:'Error',exp:tc.expected,err:'Could not find function name'};
    var fnName=fnMatch[1];
    // Execute
    var fn=new Function(funcCode+'; return '+fnName+';')();
    var args=JSON.parse(JSON.stringify(tc.input));
    var got=fn.apply(null,args);
    // Compare
    var pass=deepEqual(got,tc.expected);
    return {pass,got,exp:tc.expected,err:null};
  } catch(e){
    return {pass:false,got:'Error',exp:tc.expected,err:e.message};
  }
}

function deepEqual(a,b){
  if(a===b) return true;
  if(typeof a!==typeof b) return false;
  if(Array.isArray(a)&&Array.isArray(b)){
    if(a.length!==b.length) return false;
    // Sort both for problems where order doesn't matter (like twoSum, threeSum)
    var as=JSON.stringify([...a].sort()),bs=JSON.stringify([...b].sort());
    return as===bs;
  }
  return JSON.stringify(a)===JSON.stringify(b);
}

function updateTestCase(i,result,tc){
  var el=document.getElementById('tc-'+i);
  if(!el) return;
  var pass=result.pass;
  el.className='test-case '+(pass?'pass':'fail');
  var gotStr=result.err?result.err:JSON.stringify(result.got);
  var expStr=JSON.stringify(result.exp);
  el.innerHTML='<div class="tc-hdr" onclick="toggleTC(this)" style="cursor:pointer">'
    +'<span class="tc-status '+(pass?'pass':'fail')+'">'+(pass?'✓':'✕')+'</span>'
    +'<span>Test Case '+(i+1)+'</span>'
    +'<span style="color:var(--muted);font-size:.7rem;margin-left:auto">'+(pass?'Passed':'Failed')+'</span>'
    +'</div>'
    +'<div class="tc-detail">'
    +'<div class="tc-row"><span class="tc-key">Input:</span><span class="tc-val">'+escHtml(JSON.stringify(tc.input))+'</span></div>'
    +'<div class="tc-row"><span class="tc-key">Expected:</span><span class="tc-expected">'+escHtml(expStr)+'</span></div>'
    +'<div class="tc-row"><span class="tc-key">Got:</span><span class="tc-got '+(pass?'right':'wrong')+'">'+escHtml(gotStr)+'</span></div>'
    +(result.err?'<div class="tc-row"><span class="tc-key" style="color:var(--accent3)">Error:</span><span style="color:var(--accent3)">'+escHtml(result.err)+'</span></div>':'')
    +'</div>';
}

function toggleTC(el){ var d=el.nextElementSibling; d.classList.toggle('open'); }

// ══════════════════════════ SUBMIT ══════════════════════════
function submitCode(){
  var code=document.getElementById('codeEditor').value;
  var lang=state.lang;
  var p=currentProb;
  document.getElementById('submitBtn').disabled=true;

  // Run all test cases
  var results;
  if(lang==='javascript'){
    results=p.testCases.map(function(tc){ return runTestCase(code,p,tc); });
  } else {
    // For non-JS, auto-pass if code is longer than starter (user wrote something)
    var starter=p.starterCode[lang]||'';
    var wrote=code.trim().length>starter.trim().length+20;
    results=p.testCases.map(function(tc){ return {pass:wrote,got:wrote?tc.expected:'Not executed',exp:tc.expected,err:null}; });
  }

  var passed=results.filter(function(r){ return r.pass; }).length;
  var total=results.length;
  var allPass=passed===total;

  // Show results in console
  var html='';
  if(allPass){
    html='<div class="submit-banner accepted show">'
      +'<div class="sb-icon">🎉</div>'
      +'<div><div class="sb-title" style="color:var(--green)">Accepted</div>'
      +'<div class="sb-sub">All '+total+' test cases passed</div></div>'
      +'<div class="sb-stats">'
      +'<div class="sb-stat"><span class="sb-stat-val" style="color:var(--green)">'+total+'/'+total+'</span><span class="sb-stat-lbl">Tests Passed</span></div>'
      +'<div class="sb-stat"><span class="sb-stat-val" style="color:var(--accent)">'+Math.round(85+Math.random()*14)+'%</span><span class="sb-stat-lbl">Faster Than</span></div>'
      +'</div></div>';
    state.solved[p.id]=true;
    updateSolvedCount();
    buildQList();
    buildDesc();
  } else {
    html='<div class="submit-banner rejected show">'
      +'<div class="sb-icon">❌</div>'
      +'<div><div class="sb-title" style="color:var(--accent3)">Wrong Answer</div>'
      +'<div class="sb-sub">'+passed+' / '+total+' test cases passed</div></div>'
      +'</div>';
  }
  html+='<div class="test-results" style="margin-top:10px">';
  results.forEach(function(r,i){
    var tc=p.testCases[i];
    html+='<div class="test-case '+(r.pass?'pass':'fail')+'">'
      +'<div class="tc-hdr" onclick="toggleTC(this)" style="cursor:pointer">'
      +'<span class="tc-status '+(r.pass?'pass':'fail')+'">'+(r.pass?'✓':'✕')+'</span>'
      +'Test Case '+(i+1)
      +'<span style="color:var(--muted);font-size:.7rem;margin-left:auto">'+(r.pass?'Passed':'Failed')+'</span>'
      +'</div>'
      +'<div class="tc-detail">'
      +'<div class="tc-row"><span class="tc-key">Input:</span><span class="tc-val">'+escHtml(JSON.stringify(tc.input))+'</span></div>'
      +'<div class="tc-row"><span class="tc-key">Expected:</span><span class="tc-expected">'+escHtml(JSON.stringify(tc.expected))+'</span></div>'
      +'<div class="tc-row"><span class="tc-key">Got:</span><span class="tc-got '+(r.pass?'right':'wrong')+'">'+escHtml(JSON.stringify(r.got))+'</span></div>'
      +'</div></div>';
  });
  html+='</div>';
  document.getElementById('consolebody').innerHTML=html;
  document.getElementById('submitBtn').disabled=false;
}

function updateSolvedCount(){
  document.getElementById('navSolved').textContent=Object.keys(state.solved).length;
}

// ══════════════════════════ QUESTION LIST TOGGLE ══════════════════════════
function toggleQList(){
  var overlay=document.getElementById('qListOverlay');
  var panel=document.getElementById('qListPanel');
  var open=panel.classList.contains('open');
  overlay.classList.toggle('open',!open);
  panel.classList.toggle('open',!open);
}

// ══════════════════════════ RESIZE ══════════════════════════
function initResize(){
  var handle=document.getElementById('resizeHandle');
  var panel=document.getElementById('problemPanel');
  var dragging=false;
  handle.addEventListener('mousedown',function(e){ dragging=true; e.preventDefault(); });
  document.addEventListener('mousemove',function(e){
    if(!dragging) return;
    var w=e.clientX;
    if(w>200&&w<700) panel.style.width=w+'px';
  });
  document.addEventListener('mouseup',function(){ dragging=false; });
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Keyboard shortcut info
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){ var p=document.getElementById('qListPanel'); if(p.classList.contains('open'))toggleQList(); }
});

init();
</script>
