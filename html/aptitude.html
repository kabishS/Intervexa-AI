<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intervexa AI — Aptitude Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/aptitude.css">
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark"><i class="fa-solid fa-microchip"></i></div>
    <div>
      <div class="brand-name">Intervexa AI</div>
      <div class="brand-sub">APTITUDE MODULE</div>
    </div>
  </div>
  <div class="header-right">
    <div class="score-pill">
      <span>Score <span class="val" id="scoreVal">0/0</span></span>
      <div class="streak" id="streakBox">🔥 <span id="streakVal">0</span></div>
    </div>
    <button class="stop-btn" id="stopBtn"><i class="fa-solid fa-stop"></i> Stop</button>
    <button class="restart-btn" id="restartBtn"><i class="fa-solid fa-rotate-right"></i> Restart</button>
  </div>
</header>

<div class="layout">
  <div class="track-wrap">
    <div class="track" id="track"></div>
    <div class="track-labels">
      <span>Question <span id="qNum">1</span> of <span id="qTotal">20</span></span>
      <span id="trackPct">0%</span>
    </div>
  </div>

  <main>
    <div class="eyebrow" id="eyebrow"><span class="dot"></span> Aptitude Round</div>

    <div class="card" id="card">
      <div class="scan-line" id="scanLine"></div>

      <div id="quizView">
        <div class="question" id="questionText">Loading question…</div>
        <div class="options" id="optionsBox"></div>
        <div class="feedback" id="feedback"></div>
        <div class="error-box" id="errorBox">Couldn't reach the question service. <span id="retryLink" style="text-decoration:underline; cursor:pointer;">Retry</span></div>
      </div>

      <div class="summary" id="summaryView">
        <div class="big" id="summaryScore">0/0</div>
        <div class="sub" id="summaryMsg">Session stopped</div>
        <div class="summary-stats">
          <div><div class="n" id="sumCorrect">0</div><div class="l">Correct</div></div>
          <div><div class="n" id="sumWrong">0</div><div class="l">Wrong</div></div>
          <div><div class="n" id="sumBest">0</div><div class="l">Best streak</div></div>
        </div>
        <button class="restart-btn" id="restartBtn"><i class="fa-solid fa-rotate-right"></i> Start new session</button>
      </div>
    </div>

    <div class="footer-row" id="footerRow">
      <button class="back-btn" id="backBtn"><i class="fa-solid fa-arrow-left"></i> Back</button>
      <div class="hint">Select an answer, or press 1–4</div>
      <button class="next-btn" id="nextBtn">Next question <i class="fa-solid fa-arrow-right"></i></button>
    </div>
  </main>
</div>

<div class="backpage">
    <!---packpage go button if click it go home.html-->
  <a href="../html/home.html">
    <button><i class="fa-solid fa-arrow-left"></i> Back-page</button>
</a>
</div>

<script src="../js/aptitude.js"></script>

</body>
</html>
